<script type="text/javascript">

$j = jQuery.noConflict();
//set the attraction ID
$j("#uniIDSubmit").click(
				function(){
					uniIDPullData()
})		
/*copy to clipboard*/	
$j(document).on("click", ".clipBtn",function() {
		var copyTarget =  $j(this).children("input").val();
		var copyTxt = document.getElementById(copyTarget);
		 copyTxt.select();
		 navigator.clipboard.writeText(copyTxt.value);

	});	
	function uniIDPullData() {	
			//load the container div
            let eventListDiv = $j("#uniIDMainTable");
			let eventIDStringDiv =  $j("#uniIDString");
			let eventArtistIDStringDiv =  $j("#uniEventAndIDString p");

			var setUniversalID = $j("#attractionID").val();
			//console.log(setUniversalID)
			let eventCount = 0;
			//remove specific events via UID
			let removeEvent = [];
			//end points  
			let epPublic = "https://app.ticketmaster.com/discovery/v2/events?apikey=fsHHDDaHGLhPm2TW8YDCvubQL4f65Kts&attractionId="+ setUniversalID +"&locale=*&size=100"
			let epQa = ""
			let epProd = ""
			//get the data file
             $j.ajax({
               type: 'GET',
               url: epPublic,
               dataType: 'html',
				success: function(data) {
					let eventData = JSON.parse(data);
					let eventList = eventData._embedded['events'];
					
					$j.each(eventList, function(key,value){

						//venue name						
						let venueName = value._embedded.venues[0].name
						//fetch the image url with width of 205px
						//let imgList = value.images;
						//let imgURL = imgList.find(k=>k.width=='205').url;
						let venueTag = venueName.replace(/\s/g, '');
						let dateTag = value.dates.start.localDate;
						let timeTag = value.dates.start.localTime;//new Intl.DateTimeFormat('en-AU', options2).format(eventTime);
						//let cleanTime = timeTag.replace(':','');
						let nameTag = value.name;
			
						let newEvent = $j("<div class='uniIDRow'><span>"+ value.name +"</span><span>"+ venueName +"</span><span>"+ dateTag +" / "+ timeTag +"</span><span>"+ value.id +"</span><div data-copy='"+ value.id +"' class='clipBtn'><img src='https://s1.ticketm.net/tm/en-au/img/static/imageguide/imgs_copy_blue_ico.svg' alt='Copy To Clipboard'><input id="+ value.id +" class'uIDinput' type='text' value="+ value.id +"></div></div>");
						//apends event data into an element
						/*let newEvent = $j("<div class='uniIDRow'><span>"+ value.name +"</span><span>"+ venueName +"</span><span>"+ dateTag +" / "+ timeTag +"</span><span>"+ value.id +"</span><div data-copy='"+ value.id +"' class='clipBtn'><img src='https://s1.ticketm.net/tm/en-au/img/static/imageguide/imgs_copy_blue_ico.svg' alt='Copy To Clipboard'><p>"+ value.id +"</p></div></div>");*/
						//console.log($j(newEvent).data('venue'))

						eventListDiv.append(newEvent);
						//string
						let newEventID = $j("<p>"+value.id+", </p>");
						eventIDStringDiv.append(newEventID)
						//string with artist
						let newEventArtistID = $j("<p><strong> "+nameTag+"</strong> + "+value.id+" , </p>");
						eventArtistIDStringDiv.append(newEventArtistID)
						});	
					},
                    error: function (xhr, ajaxOptions, thrownError) { 
                        //fade in the error element
                       console.log("error pulling data")
                    }
                });
};

</script>
